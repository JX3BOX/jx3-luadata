name: CI

on:
    push:
        branches: [main]

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write

        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: recursive
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org/
            - run: npm ci
            - run: npm run lint:nofix
            - run: npm run build
            - run: npm test
            - run: npm publish --provenance --access public
